<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F9F9F9;
            color: #1D1D1D;
            line-height: 1.6;
        }

        .email-wrapper {
            width: 100%;
            background-color: #F9F9F9;
            padding: 40px 20px;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .email-header {
            text-align: center;
            padding: 40px 40px 10px;
            background-color: #FFF3E0;
        }

        .email-title {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            color: #1D1D1D;
            margin: 0;
        }

        .alert-badge {
            font-size: 18px;
            color: #dc3545;
            font-weight: 600;
            margin-top: 10px;
        }

        .email-body {
            padding: 30px 40px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1D1D1D;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #E8E8E8;
        }

        .info-row {
            display: flex;
            padding: 8px 0;
        }

        .info-label {
            font-size: 14px;
            color: #4E4E4E;
            width: 140px;
            flex-shrink: 0;
        }

        .info-value {
            font-size: 14px;
            color: #1D1D1D;
            font-weight: 500;
        }

        .cta-section {
            text-align: center;
            margin: 30px 0;
        }

        .cta-button {
            display: inline-block;
            background-color: #FF5C00;
            color: #FFFFFF;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
        }

        .email-footer {
            background-color: #F9F9F9;
            padding: 15px 40px;
            text-align: center;
            font-size: 12px;
            color: #4E4E4E;
        }

        @media only screen and (max-width: 600px) {
            .email-wrapper {
                padding: 20px 10px;
            }

            .email-header {
                padding: 30px 24px 16px;
            }

            .email-body {
                padding: 20px 24px;
            }

            .email-title {
                font-size: 22px;
            }

            .info-row {
                flex-direction: column;
            }

            .info-label {
                width: 100%;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="email-header">
                <h1 class="email-title">Payment Failed</h1>
                <div class="alert-badge">{{ policy_numbers }}</div>
            </div>

            <div class="email-body">
                <div class="section-title">Payment Details</div>

                <div class="info-row">
                    <span class="info-label">Amount Due:</span>
                    <span class="info-value">${{ amount_due }}</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Coverage:</span>
                    <span class="info-value">{{ coverage_types }}</span>
                </div>

                <div class="section-title">Customer Information</div>

                <div class="info-row">
                    <span class="info-label">Company:</span>
                    <span class="info-value">{{ company_name }}</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Email:</span>
                    <span class="info-value">{{ customer_email }}</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Policy Number:</span>
                    <span class="info-value">{{ policy_numbers }}</span>
                </div>

                <div class="cta-section">
                    <a href="{{ admin_url }}" class="cta-button" style="background-color: #FF5C00; color: #FFFFFF;">View in Admin</a>
                </div>
            </div>

            <div class="email-footer">
                This is an internal notification for the Corgi team.
            </div>
        </div>
    </div>
</body>
</html>
