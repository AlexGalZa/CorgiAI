{% extends 'admin/base_site.html' %}

{% load i18n unfold %}

{% block breadcrumbs %}{% endblock %}

{% block title %}
  {{ iframe_title }} | {{ site_title|default:_('Django site admin') }}
{% endblock %}

{% block content %}
  <div style="margin: -20px -24px; height: calc(100vh - 64px);">
    <iframe
      src="{{ iframe_url }}"
      style="width: 100%; height: 100%; border: none;"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>
{% endblock %}
