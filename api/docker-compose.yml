services:
  postgres:
    image: postgres:17.6-alpine
    container_name: corgi-startup-line-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: corgi_admin
      POSTGRES_PASSWORD: Corg1Secure2026x
      POSTGRES_DB: corgi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corgi_admin -d corgi
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    container_name: corgi-startup-line-django
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: corgi
      DATABASE_USER: corgi_admin
      DATABASE_PASSWORD: Corg1Secure2026x
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "local-dev-secret-key-change-in-production"
      JWT_SECRET_KEY: "local-dev-jwt-secret-key-change-in-production"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:

