# =============================================================================
# Corgi — Full Development Stack
# =============================================================================
# Usage:
#   docker compose up          — start everything
#   docker compose up -d       — start in background
#   docker compose up db redis — start infra only (for local dev)
#   docker compose down        — stop everything
#   docker compose down -v     — stop + delete volumes (fresh DB)
# =============================================================================

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: corgi
      POSTGRES_USER: corgi_admin
      POSTGRES_PASSWORD: Corg1Secure2026x
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corgi_admin -d corgi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: corgi
      DATABASE_USER: corgi_admin
      DATABASE_PASSWORD: Corg1Secure2026x
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      REDIS_URL: redis://redis:6379/1
      ALLOWED_HOSTS: "localhost,127.0.0.1,api"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      CORGI_PORTAL_URL: "http://localhost:3000"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./api:/app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  portal:
    build:
      context: ./portal
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
