# Part of the multi-provider CI split. CircleCI runs portal + admin
# builds and Python/JS linters on the 6000 min/mo free tier.
# Semaphore owns api-tests, Harness owns Django safety + config
# scans, Buddy owns dep auditing, GitHub Actions owns the deploy +
# native cheap checks.
#
# All pnpm invocations use `npx pnpm@9.15.0` to avoid the corepack
# key-rotation bug and the root-only /usr/local/bin symlink on
# cimg/node. No global install, no sudo needed.

version: 2.1

executors:
  python-executor:
    docker:
      - image: cimg/python:3.12.7
    resource_class: medium
    working_directory: ~/project
  node-executor:
    docker:
      - image: cimg/node:22.12.0
    resource_class: medium
    working_directory: ~/project

jobs:
  api-lint:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install ruff (pinned so local + CI agree)
          command: pip install "ruff==0.15.10"
      - run:
          name: ruff check
          command: cd api && ruff check .
      - run:
          name: ruff format --check
          command: cd api && ruff format --check .

  portal-lint:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: pnpm install (portal)
          command: cd portal && npx --yes pnpm@9.15.0 install --no-frozen-lockfile
      - run:
          name: pnpm lint
          command: cd portal && npx --yes pnpm@9.15.0 run lint

  portal-build:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: pnpm install (portal)
          command: cd portal && npx --yes pnpm@9.15.0 install --no-frozen-lockfile
      - run:
          name: pnpm build
          command: cd portal && npx --yes pnpm@9.15.0 run build

  admin-build:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: pnpm install (admin)
          command: cd admin && npx --yes pnpm@9.15.0 install --no-frozen-lockfile
      - run:
          name: pnpm build
          command: cd admin && npx --yes pnpm@9.15.0 run build

  semgrep:
    docker:
      - image: returntocorp/semgrep
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Semgrep scan
          command: |
            semgrep scan \
              --config=p/default \
              --config=p/security-audit \
              --config=p/python \
              --config=p/django \
              --config=p/javascript \
              --config=p/typescript \
              --error --severity=ERROR --no-git-ignore \
              || true

  trivy-fs:
    docker:
      - image: aquasec/trivy:latest
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Trivy filesystem scan
          command: |
            trivy fs \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              --skip-dirs node_modules,.venv,staticfiles \
              .

  portal-tsc:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: pnpm install (portal)
          command: cd portal && npx --yes pnpm@9.15.0 install --no-frozen-lockfile
      - run:
          name: tsc --noEmit
          command: cd portal && npx --yes pnpm@9.15.0 exec tsc --noEmit

  admin-tsc:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: pnpm install (admin)
          command: cd admin && npx --yes pnpm@9.15.0 install --no-frozen-lockfile
      - run:
          name: tsc --noEmit
          command: cd admin && npx --yes pnpm@9.15.0 exec tsc --noEmit

  hadolint:
    docker:
      - image: hadolint/hadolint:latest-alpine
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Hadolint Dockerfile
          command: hadolint Dockerfile || true

  build-and-push:
    # Builds the all-in-one Docker image, pushes to GHCR, and pings the
    # Dokploy webhook so the VPS pulls the new image.
    # Required env vars (CircleCI Project Settings -> Environment):
    #   GHCR_USERNAME        — GitHub username (e.g. PockySweet)
    #   GHCR_PAT             — GitHub PAT with write:packages
    #   DOKPLOY_WEBHOOK_URL  — Dokploy deploy webhook URL
    #   VITE_SSO_LOGIN_URL   Admin SSO login URL baked into the Vite build
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Log in to GHCR
          command: |
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - run:
          name: Build image
          command: |
            SHA_SHORT=$(echo "$CIRCLE_SHA1" | cut -c1-7)
            IMAGE="ghcr.io/pockysweet/corgi"
            docker build \
              --build-arg GIT_SHA=$CIRCLE_SHA1 \
              --build-arg VITE_API_URL="" \
              --build-arg NEXT_PUBLIC_API_URL="" \
              --build-arg VITE_SSO_LOGIN_URL="$VITE_SSO_LOGIN_URL" \
              -t "$IMAGE:latest" \
              -t "$IMAGE:sha-$SHA_SHORT" \
              .
      - run:
          name: Push image
          command: |
            SHA_SHORT=$(echo "$CIRCLE_SHA1" | cut -c1-7)
            IMAGE="ghcr.io/pockysweet/corgi"
            docker push "$IMAGE:latest"
            docker push "$IMAGE:sha-$SHA_SHORT"
      - run:
          name: Trigger Dokploy redeploy
          command: |
            if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
              echo "DOKPLOY_WEBHOOK_URL not set; skipping"
              exit 0
            fi
            curl -sS -X POST "$DOKPLOY_WEBHOOK_URL" \
              --max-time 30 --retry 3 --retry-delay 5 --fail \
              || echo "Dokploy webhook call failed; redeploy manually"

workflows:
  corgi-ci:
    jobs:
      - api-lint
      - portal-lint
      - portal-build
      - portal-tsc
      - admin-build
      - admin-tsc
      - semgrep
      - trivy-fs
      - hadolint
      - build-and-push:
          # Only push to master branch — don't build PR branches.
          filters:
            branches:
              only: master
