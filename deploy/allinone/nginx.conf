# Preserve Traefik's X-Forwarded-* headers when they're present, fall back
# to local nginx values otherwise. Without this, downstream Next.js / Django
# build http:// URLs from an https:// page and the browser blocks them.
map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
}

map $http_x_forwarded_host $proxy_forwarded_host {
    default $http_host;
    "~.+"   $http_x_forwarded_host;
}

map $http_x_forwarded_port $proxy_forwarded_port {
    default $server_port;
    "~.+"   $http_x_forwarded_port;
}

upstream django {
    server 127.0.0.1:8000;
}

upstream nextjs {
    server 127.0.0.1:3000;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50M;

    # Health check used by Docker HEALTHCHECK + Dokploy
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Version file baked at image build time. Curl this to know which
    # commit the running container was built from.
    location = /version {
        alias /var/www/version.txt;
        default_type text/plain;
        access_log off;
        add_header Cache-Control "no-store";
    }
    location = /version.txt {
        alias /var/www/version.txt;
        default_type text/plain;
        access_log off;
        add_header Cache-Control "no-store";
    }

    # Admin SPA (Vite build compiled with base=/ops/)
    location /ops/ {
        alias /var/www/ops/;
        try_files $uri $uri/ /ops/index.html;
    }

    # Django-served paths. The list mirrors config/urls.py urlpatterns:
    #   /api/v1/..., /api/external/v1/..., /admin/... (admin + Unfold),
    #   /health/, /share/<token>, /sentry-debug/.
    # No trailing slash on proxy_pass so the full path reaches Django.
    location ~ ^/(api|admin|health|share|sentry-debug|static)(/|$) {
        proxy_pass http://django;
        proxy_set_header Host $proxy_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
        proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # Everything else → Next.js portal
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $proxy_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
        proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
