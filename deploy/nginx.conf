# =============================================================================
# Corgi Insurance — Nginx Blue-Green Configuration
# =============================================================================
# Traffic is directed to the "active" upstream, which is controlled by the
# active.conf include file. Switching traffic means replacing that file and
# sending `nginx -s reload` — no downtime, no dropped connections.
#
# The deploy.sh script manages this automatically.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'slot=$upstream_http_x_slot';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── Upstream definitions (blue / green) ───────────────────────────────
    upstream api-blue {
        server api-blue:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    upstream api-green {
        server api-green:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # ── Active slot is injected by deploy.sh (see active.conf) ───────────
    # The include below provides:
    #   upstream api-active { server api-<blue|green>:8000; }
    include /etc/nginx/conf.d/active.conf;

    # ── Rate limiting ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow health checks over plain HTTP (for internal load balancers)
        location /health/ {
            proxy_pass http://api-active;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 32m;

        # ── Static files ──────────────────────────────────────────────────
        location /static/ {
            alias /static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Health check (unauthenticated) ────────────────────────────────
        location /health/ {
            proxy_pass http://api-active;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── Auth endpoints (stricter rate limit) ──────────────────────────
        location ~ ^/api/v1/users/(register|login|verify) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api-active;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── API ───────────────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api-active;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
