name: Build and Push Image

# Builds the all-in-one Dockerfile on GitHub's runners (fast, free), pushes
# to GHCR, and pings a Dokploy webhook so the server just pulls the new
# image instead of rebuilding from scratch on the VPS.
#
# Required secrets:
#   DOKPLOY_WEBHOOK_URL  The app's "Deploy Webhook URL" from the Dokploy
#                        dashboard (Settings -> Deploy Token -> Copy URL).
#                        Skip the webhook step if not set.

on:
  # Push trigger disabled while the GitHub Actions billing cap is
  # exhausted; CircleCI + Semaphore + Harness + Buddy cover these
  # jobs in the meantime. Re-enable by adding:
  #   push:
  #     branches: [master]
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push all-in-one image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            VITE_SSO_LOGIN_URL=${{ secrets.VITE_SSO_LOGIN_URL }}
            GIT_SHA=${{ github.sha }}

      - name: Trigger Dokploy redeploy
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_URL secret is not set; skipping auto-redeploy."
            echo "Redeploy manually in the Dokploy dashboard, or add the secret."
            exit 0
          fi
          curl -sS -X POST "$WEBHOOK_URL" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --fail || {
              echo "::warning::Dokploy webhook call failed. Redeploy manually."
            }

      - name: Verify deploy (poll /version until SHA matches)
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::DEPLOY_URL secret not set; skipping post-deploy verification."
            echo "Add a DEPLOY_URL secret (e.g. https://<host>) to get automatic verification."
            exit 0
          fi
          echo "Waiting for $DEPLOY_URL/version to report SHA $EXPECTED_SHA"
          for attempt in $(seq 1 30); do
            actual=$(curl -sSkL --max-time 10 "$DEPLOY_URL/version" 2>/dev/null | tr -d '[:space:]' || true)
            if [ "$actual" = "$EXPECTED_SHA" ]; then
              echo "::notice::Live SHA matches $EXPECTED_SHA after ${attempt} attempt(s)."
              exit 0
            fi
            echo "  attempt $attempt: live=\"$actual\" expected=\"$EXPECTED_SHA\""
            sleep 10
          done
          echo "::error::Live /version did not match $EXPECTED_SHA after 5 minutes. Dokploy may have silently kept the old container."
          exit 1
