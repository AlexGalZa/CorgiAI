pipeline:
  name: corgi
  identifier: corgi
  projectIdentifier: corgi
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.corgi
        repoName: corgi
        build: <+input>
  stages:
    - stage:
        name: API Tests
        identifier: api_tests
        description: Django test suite against a Postgres service
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Background
                  name: Postgres
                  identifier: postgres
                  spec:
                    image: postgres:14-alpine
                    shell: Sh
                    envVariables:
                      POSTGRES_DB: corgi_test
                      POSTGRES_USER: postgres
                      POSTGRES_PASSWORD: postgres
                    portBindings:
                      "5432": "5432"
              - step:
                  type: Run
                  name: Install deps
                  identifier: install_deps
                  spec:
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      cd api
                      pip install --no-cache-dir -r requirements.txt
              - step:
                  type: Run
                  name: Django migrate and test
                  identifier: django_test
                  spec:
                    image: python:3.12-slim
                    shell: Sh
                    envVariables:
                      DATABASE_HOST: localhost
                      DATABASE_PORT: "5432"
                      DATABASE_NAME: corgi_test
                      DATABASE_USER: postgres
                      DATABASE_PASSWORD: postgres
                      DJANGO_SECRET_KEY: harness-test-key
                      DJANGO_DEBUG: "True"
                      ALLOWED_HOSTS: "*"
                    command: |-
                      cd api
                      pip install --no-cache-dir -r requirements.txt
                      python manage.py migrate --noinput
                      python manage.py test --verbosity=2
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
    - stage:
        name: Config Scans
        identifier: config_scans
        description: Checkov and Zizmor SAST on config and workflow files
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Checkov
                  identifier: checkov
                  spec:
                    image: bridgecrew/checkov:latest
                    shell: Sh
                    command: |-
                      checkov -d . --soft-fail \
                        --framework dockerfile,github_actions,secrets,yaml \
                        --quiet --compact
              - step:
                  type: Run
                  name: Zizmor
                  identifier: zizmor
                  spec:
                    image: python:3.12-slim
                    shell: Sh
                    command: |-
                      pip install --no-cache-dir zizmor
                      zizmor . || true
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
    - stage:
        name: Django Security
        identifier: django_security
        description: manage.py check --deploy in prod mode and migration guard
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: check --deploy
                  identifier: check_deploy
                  spec:
                    image: python:3.12-slim
                    shell: Sh
                    envVariables:
                      DJANGO_SECRET_KEY: harness-check-key
                      DJANGO_DEBUG: "False"
                      ALLOWED_HOSTS: "*"
                    command: |-
                      cd api
                      pip install --no-cache-dir -r requirements.txt
                      python manage.py check --deploy --fail-level WARNING
              - step:
                  type: Run
                  name: Migration guard
                  identifier: migration_guard
                  spec:
                    image: python:3.12-slim
                    shell: Sh
                    envVariables:
                      DJANGO_SECRET_KEY: harness-check-key
                      DJANGO_DEBUG: "True"
                      ALLOWED_HOSTS: "*"
                    command: |-
                      cd api
                      pip install --no-cache-dir -r requirements.txt
                      python manage.py makemigrations --check --dry-run
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
